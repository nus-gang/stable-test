syntax = "proto3";
package stablecoin.stablecoin.module.v1;

import "cosmos/app/v1alpha1/module.proto";

option go_package = "stablecoin/x/stablecoin/types";

// Module is the config object for the module.
message Module {
  option (cosmos.app.v1alpha1.module) = {go_import: "stablecoin/x/stablecoin"};

  // authority defines the custom module authority.
  // If not set, defaults to the governance module.
  string authority = 1;
}
